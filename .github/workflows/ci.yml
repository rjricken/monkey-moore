name: CI

on:
  push:
    branches: 
      - "master"
  pull_request:
    branches: 
      - "master"
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl zip unzip tar autoconf autoconf-archive automake libtool libltdl-dev pkg-config bison flex ninja-build libx11-dev libxft-dev libxext-dev libxi-dev libxtst-dev libxcursor-dev libxdamage-dev libxcomposite-dev libxrandr-dev libxrender-dev libxfixes-dev libxkbcommon-dev libgl1-mesa-dev

      - name: Configure CMake
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release
      
      - name: Run Tests
        run: ctest --preset release

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    env: 
      WX_VERSION: "3.2.9"
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set VCPKG_ROOT
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT"

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release
        
      - name: Run Tests
        run: ctest --preset release
