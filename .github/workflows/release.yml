name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_bincache

jobs:
  release-linux:
    name: Build & Package Linux x64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Vcpkg Binary Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev wget

      - name: Configure CMake
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package AppImage
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ ! "$TAG_NAME" =~ ^v ]]; then TAG_NAME="dev"; fi

          # Download linuxdeploy and make it executable
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Configure and run the packager
          export LINUXDEPLOY=$(pwd)/linuxdeploy-x86_64.AppImage
          chmod +x scripts/package-appimage.sh
          ./scripts/package-appimage.sh build-release

          mv dist/Monkey-Moore-x86_64.AppImage "dist/monkey-moore-${TAG_NAME}-linux-x86_64.AppImage"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Portable-Build
          path: dist/monkey-moore-*-linux-x86_64.AppImage
          retention-days: 1

  release-windows:
    name: Build & Package Windows x64
    runs-on: windows-latest
    env:
      WX_VERSION: "3.2.9"
    steps:
      - uses: actions/checkout@v4

      - name: Vcpkg Binary Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Set VCPKG_ROOT
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT"

      - name: Create vcpkg cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE

      - name: Download and Install Dependencies
        shell: pwsh
        run: |
          $wxDir = "C:\Libraries\wxWidgets"
          New-Item -ItemType Directory -Force -Path $wxDir

          $baseUrl = "https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}"

          Write-Host "Downloading wxWidgets v${{ env.WX_VERSION }} headers and binaries..."
          Invoke-WebRequest -Uri "$baseUrl/wxWidgets-${{ env.WX_VERSION }}-headers.7z" -OutFile "headers.7z"
          Invoke-WebRequest -Uri "$baseUrl/wxMSW-${{ env.WX_VERSION }}_vc14x_x64_Dev.7z" -OutFile "dev.7z"
          Invoke-WebRequest -Uri "$baseUrl/wxMSW-${{ env.WX_VERSION }}_vc14x_x64_ReleaseDLL.7z" -OutFile "release_dll.7z"

          Write-Host "Extracting to $wxDir..."
          7z x headers.7z -o"$wxDir" -y
          7z x dev.7z -o"$wxDir" -y
          7z x release_dll.7z -o"$wxDir" -y

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake --preset release -DwxWidgets_ROOT_DIR="C:\Libraries\wxWidgets"

      - name: Build
        run: cmake --build --preset release

      - name: Stage
        run: cmake --install build-release --prefix staging --component MonkeyMooreRelease
      
      - name: Package
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if ($tagName -notmatch "^v") { $tagName = "dev" }

          $distName = "monkey-moore-$tagName-windows-x86_64"

          Write-Host "Packaging $distName..."
          New-Item -ItemType Directory -Force -Path $distName
          Copy-Item -Path "staging\*" -Destination $distName -Recurse -Force

          # copy required wxWidgets DLLs
          $wxLibDir = "C:\Libraries\wxWidgets\lib\vc14x_x64_dll"
          Copy-Item -Path "$wxLibDir\wxbase32u_vc14x_x64.dll" -Destination $distName -Force
          Copy-Item -Path "$wxLibDir\wxmsw32u_core_vc14x_x64.dll" -Destination $distName -Force

          # copy assets (images, language packs)
          Copy-Item -Path "assets\ui" -Destination $distName -Recurse -Force
          Copy-Item -Path "assets\i18n\locales" -Destination $distName -Recurse -Force

          Compress-Archive -Path "$distName\*" -DestinationPath "$distName.zip" -Force
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Portable-Build
          path: monkey-moore-*-windows-x86_64.zip

  publish:
    name: Publish to GitHub Releases
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ release-windows, release-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Portable-Build
          path: release-assets

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-Portable-Build
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
